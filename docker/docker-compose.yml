version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: threat_intel_db
      POSTGRES_USER: threat_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://threat_user:password@postgres:5432/threat_intel_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET_KEY: change_me_in_env
      VT_API_KEY: ${VT_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://threat_user:password@postgres:5432/threat_intel_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET_KEY: change_me_in_env
      VT_API_KEY: ${VT_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
